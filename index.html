<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO -->
    <title>ThinkersLabe – AI Tools for Learning & Creativity</title>
    <meta name="description"
        content="ThinkersLabe builds AI tools to help people learn, create, and explore ideas. Discover powerful AI products for curious minds.">
    <meta name="keywords"
        content="AI tools, artificial intelligence, AI for students, learning AI, AI education, ThinkersLabe , Mathematical AI, STEM Video Generator">
    <meta name="author" content="ThinkersLabe">
    <meta name="robots" content="index, follow">

    <!-- Canonical -->
    <link rel="canonical" href="https://thinkerslabe.com">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="ThinkersLabe – AI for Curious Minds">
    <meta property="og:description"
        content="Explore AI tools designed for creativity and learning. Built for curious minds.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thinkerslabe.com">
    <meta property="og:image" content="https://thinkerslabe.com/preview.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ThinkersLabe – AI for Curious Minds">
    <meta name="twitter:description"
        content="AI-powered tools to enhance creativity, curiosity, and learning.">
    <meta name="twitter:image" content="https://thinkerslabe.com/preview.png">

    <!-- Performance: Preconnect Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind (DEV ONLY — remove in production and bundle locally) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#000000',
                    }
                }
            }
        }
    </script>

    <!-- Structured Data (SEO boost) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ThinkersLabe",
      "url": "https://thinkerslabe.com",
      "logo": "https://thinkerslabe.com/logo-main.png",
      "description": "AI tools for learning and creativity",
      "sameAs": [
        "https://www.linkedin.com",
        "https://twitter.com"
      ]
    }
    </script>

    <!-- Styles -->
    <style>
        :root {
            --bg-primary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
        }

        .dark {
            --bg-primary: #000000;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            scroll-behavior: smooth;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display {
            font-family: 'Outfit', sans-serif;
        }

        .mesh-gradient {
            background-color: var(--bg-primary);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(147, 51, 234, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0, transparent 50%),
                radial-gradient(at 0% 100%, rgba(147, 51, 234, 0.05) 0, transparent 50%);
        }

        .dark .mesh-gradient {
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(147, 51, 234, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 0% 100%, rgba(147, 51, 234, 0.1) 0, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .dark .glass-card {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(to right, #3b82f6, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dark .text-gradient {
            background: linear-gradient(to right, #93c5fd, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="mesh-gradient min-h-screen">
    <!-- IMPORTANT: Add fallback content for SEO -->
    <noscript>
        <h1>ThinkersLabe – AI Tools for Learning & Creativity</h1>
        <p>Explore AI-powered tools to enhance creativity, learning, and innovation.</p>
    </noscript>

    <div id="root"></div>

    <!-- Your App -->
    <script type="module" src="/index.tsx"></script>
</body>

</html>
